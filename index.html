<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Portfolio</title>
</head>
<body>
    <div id="portfolio-content"></div>
    <script src="data.js"></script>
    <script>
        // Assuming data.js exports a variable called portfolioData
        function loadPortfolio() {
            const portfolioContent = document.getElementById('portfolio-content');
            portfolioContent.innerHTML = '';

            portfolioData.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = 'portfolio-item';
                itemElement.innerHTML = `<h3>${item.title}</h3><p>${item.description}</p>`;
                portfolioContent.appendChild(itemElement);
            });
        }
        loadPortfolio();
    <\/script>
</body>
</html>
